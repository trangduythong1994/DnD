<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>D&D Character Sheet</title>
</head>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Open+Sans&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/tippy.js@6/dist/tippy.css" />
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/@popperjs/core@2"></script>
<script src="https://unpkg.com/tippy.js@6"></script>
<script src="js/data/skills.js"></script>
<script src="js/data/actions.js"></script>

<script src="js/data/backgrounds/backgrounds.js"></script>

<script src="js/data/classes/cleric.js"></script>
<script src="js/data/classes/fighter.js"></script>
<script src="js/data/classes/rogue.js"></script>
<script src="js/data/classes/wizard.js"></script>
<script src="js/data/classes/classes.js"></script>

<script src="js/data/species/dwarf.js"></script>
<script src="js/data/species/halfling.js"></script>
<script src="js/data/species/human.js"></script>
<script src="js/data/species/elf.js"></script>
<script src="js/data/species/species.js"></script>

<script src="js/data/weapons.js"></script>
<script src="js/data/armors.js"></script>
<script src="js/data/spells.js"></script>
<script src="js/data/description.js"></script>
<script src="js/func.js"></script>
<script src="js/declare.js" defer></script>
<script src="js/update.js" defer></script>
<script src="js/event.js" defer></script>
<script src="js/initElements.js" defer></script>
<script src="js/saveLocalStorage.js" defer></script>

<body>
  <div class="container">
    <!-- col 1 -->
    <div class="col fixed">
      <h3>D&D Character Sheet</h3>
      <div class="section" id="general-section" style="grid-template-columns: auto 1fr 1fr">
        <label>Name</label><input type="text" id="character_name" style="grid-column: 2/span 2;">
        <label>Background <button class="button-info" id="background_info" name="background_info">i</button></label><select type="text" id="character_background" style="grid-column: 2/span 2;"></select>
        <label>Species <button class="button-info" id="species_info" name="species_info">i</button></label><select id="character_species" style="grid-column: 2/span 2;"></select>
        <label>LV/Prof. Bonus</label><input type="number" id="character_level" style="text-align: center;"
          data-computed="true" disabled><input type="text" id="character_prof_bonus" data-computed="true" disabled>
        <label>XP</label><input type="text" id="character_xp"><input type="text" id="character_next_xp_level"
          data-computed="true" disabled>
        <label>Class <button class="button-info" id="class_info" name="class_info">i</button></label><select
          id="character_class" style="grid-column: 2/span 2;"></select>
      </div>

      <div class="title">Ability Score</div>
      <div class="section" id="abilities-section" style="grid-template-columns: auto 35px 35px 35px auto 35px;">
        <label title="Sức Mạnh">Strength</label>
        <input type="number" id="as_str">
        <input type="text" id="as_str_mod" data-computed="true" disabled>
        <label>Save</label>
        <input type="checkbox" id="save_str">
        <input type="text" id="save_str_mod" data-computed="true" disabled>
        <label title="Linh Hoạt">Dexterity</label>
        <input type="number" id="as_dex">
        <input type="text" id="as_dex_mod" data-computed="true" disabled>
        <label>Save</label>
        <input type="checkbox" id="save_dex">
        <input type="text" id="save_dex_mod" data-computed="true" disabled>
        <label title="Thể Chất">Constitution</label>
        <input type="number" id="as_con">
        <input type="text" id="as_con_mod" data-computed="true" disabled>
        <label>Save</label>
        <input type="checkbox" id="save_con">
        <input type="text" id="save_con_mod" data-computed="true" disabled>
        <label title="Trí Tuệ">Intelligence</label>
        <input type="number" id="as_int">
        <input type="text" id="as_int_mod" data-computed="true" disabled>
        <label>Save</label>
        <input type="checkbox" id="save_int">
        <input type="text" id="save_int_mod" data-computed="true" disabled>
        <label title="Khôn Ngoan">Wisdom</label>
        <input type="number" id="as_wis">
        <input type="text" id="as_wis_mod" data-computed="true" disabled>
        <label>Save</label>
        <input type="checkbox" id="save_wis">
        <input type="text" id="save_wis_mod" data-computed="true" disabled>
        <label title="Khí Chất">Charisma</label>
        <input type="number" id="as_cha">
        <input type="text" id="as_cha_mod" data-computed="true" disabled>
        <label>Save</label>
        <input type="checkbox" id="save_cha">
        <input type="text" id="save_cha_mod" data-computed="true" disabled>
      </div>

      <div class="title">Skill</div>
      <div class="section" id="skills-section" style="grid-template-columns: auto 1fr auto auto 35px;"></div>
    </div>

    <!-- col-2 -->
    <div class="col fixed">
      <h3>General</h3>
      <div class="title">Hit Point</div>
      <div class="section" id="hit-points-section" style="grid-template-columns: 1fr 1fr 1fr;">
        <label style="text-align: center;">Maximum</label>
        <label style="text-align: center;">Current</label>
        <label style="text-align: center;">Temporary</label>
        <input type="number" id="hp_max">
        <input type="number" id="hp_current">
        <input type="number" id="hp_temp">
      </div>

      <div class="title">Hit Dice</div>
      <div class="section" id="hit-points-section" style="grid-template-columns: 1fr 1fr 1fr 1fr 1fr;">
        <input type="number" id="character_hd" style="visibility: hidden;"></label>
        <label style="text-align: center;">D6</label>
        <label style="text-align: center;">D8</label>
        <label style="text-align: center;">D10</label>
        <label style="text-align: center;">D12</label>
        <label>Total</label>
        <input type="number" id="hd_ttl_6" data-computed="true" disabled>
        <input type="number" id="hd_ttl_8" data-computed="true" disabled>
        <input type="number" id="hd_ttl_10" data-computed="true" disabled>
        <input type="number" id="hd_ttl_12" data-computed="true" disabled>
        <label>Used</label>
        <input type="number" id="hd_used_6">
        <input type="number" id="hd_used_8">
        <input type="number" id="hd_used_10">
        <input type="number" id="hd_used_12">
      </div>

      <div class="title">Death Save</div>
      <div class="section" id="death-saves-section" style="grid-template-columns: auto 20px 20px 20px auto 20px 20px 20px">
        <label>Success</label>
        <input type="checkbox" id="death_saves_success_1">
        <input type="checkbox" id="death_saves_success_2">
        <input type="checkbox" id="death_saves_success_3">
        <label>Failure</label>
        <input type="checkbox" id="death_saves_fail_1">
        <input type="checkbox" id="death_saves_fail_2">
        <input type="checkbox" id="death_saves_fail_3">
        <label></label>
      </div>

      <div class="title">Stats</div>
      <div class="section" id="basic-section" style="grid-template-columns: 1fr 1fr 1fr;">
        <label style="text-align: center;">Initiative</label>
        <label style="text-align: center;">Speed</label>
        <!-- <label style="text-align: center;">P. Perception</label> -->
        <label style="text-align: center;">AC</label>
        <input style="text-align: center;" type="text" id="initiative_mod" data-computed="true" disabled>
        <input style="text-align: center;" type="text" id="character_speed" data-computed="true" disabled>
        <!-- <input style="text-align: center;" type="number" id="passive_perception" data-computed="true" disabled> -->
        <input style="text-align: center;" type="number" id="armor_class" data-computed="true" disabled>
      </div>
      <div class="title">Equipment</div>
      <div class="section" id="body-slots-section" style="grid-template-columns: auto 1fr;">
        <label>Main Hand</label>
        <input type="text" class="body-slot" name="item" id="body_slots_main_hand" readonly>
        <label>Off Hand</label>
        <input type="text" class="body-slot" name="item" id="body_slots_off_hand" readonly>
        <label>Chest</label>
        <input type="text" class="body-slot" name="item" id="body_slots_chest" readonly>
      </div>
      <div class="title">Attacking</div>
      <div class="section" id="attack-section" style="grid-template-columns: auto 1fr 1fr 1fr;">
        <label>Weapon Prof.</label>
        <input type="checkbox" id="weapon_prof"><label></label><label></label>
        <label>Melee Attack Roll</label>
        <input type="text" id="melee_attack_roll_mod" data-computed="true" disabled>
        <label>Damage</label>
        <input type="text" id="melee_attack_damage_mod" data-computed="true" disabled>
        <label>Ranged Attack Roll</label>
        <input type="text" id="ranged_attack_roll_mod" data-computed="true" disabled>
        <label>Damage</label>
        <input type="text" id="ranged_attack_damage_mod" data-computed="true" disabled>
      </div>
      <div class="spellcasting-area">
        <div class="title">Spellcasting</div>
        <div class="section" id="spellcasting-section" style="grid-template-columns: auto 1fr;">
          <label>Spellcasting Ability</label>
          <input type="text" id="spellcasting_ability" data-computed="true" disabled>
          <label>Spell Attack Roll</label>
          <input type="text" id="spell_attack_roll_mod" data-computed="true" disabled>
          <label>DC</label>
          <input type="number" id="spell_save_dc" data-computed="true" disabled>
          <label>Cantrip</label>
          <input type="number" id="cantrip_qty" data-computed="true" disabled>
          <label>Prepared Spell</label>
          <input type="number" id="prepared_spell" data-computed="true" disabled>
        </div>
        <div class="title">Spell Slot</div>
        <div class="section" id="spell-slots-section"
          style="grid-template-columns: auto 20px 20px 20px 20px 20px 20px 1fr;">
        </div>
      </div>
    </div>

    <!-- col-3 -->
    <div class="col fixed">
      <h3>Feature</h3>
      <div id="features_general"></div>
      <!-- <div class="title">Senses</div>
      <div id="features_senses"></div> -->
      <div class="title">Feats</div>
      <div id="features_feats"></div>
      <div class="title">Species Features</div>
      <div class="flex-container" id="features_species"></div>
      <div class="title">Class Features</div>
      <div class="flex-container" id="features_class"></div>
      <div class="title">🟩 Action</div>
      <div class="flex-container" id="actions-section"></div>
      <div class="title">🔶 Bonus Action</div>
      <div class="flex-container" id="bonus-actions-section"></div>
      <div class="title">🔻 Reaction</div>
      <div class="flex-container" id="reactions-section"></div>
    </div>

    <!-- col-4 -->
    <div class="col fixed">
      <h3>Inventory</h3>
      <div class="title">Coins</div>
      <div class="section" id="hit-points-section" style="grid-template-columns: 1fr 1fr 1fr 1fr">
        <label style="text-align: center;">PP</label>
        <label style="text-align: center;">GP</label>
        <label style="text-align: center;">SP</label>
        <label style="text-align: center;">CP</label>
        <input type="number" id="ttl_pp">
        <input type="number" id="ttl_gp">
        <input type="number" id="ttl_sp">
        <input type="number" id="ttl_cp">
      </div>
      <div class="title" name="show_more" data-item-type="Weapon">Weapons</div>
      <div class="flex-container" id="weapons-section"></div>
      <div class="title" name="show_more" data-item-type="Armor">Armors</div>
      <div class="flex-container" id="armors-section"></div>
      <div class="title" name="show_more" data-item-type="Armor">Tools</div>
      <div class="flex-container" id="tools-section"></div>
      <div class="spellcasting-area">
        <div class="title" name="show_more" data-item-type="Spell">Spellbook</div>
        <div class="flex-container" id="spellbook-section"></div>
        <div class="title" name="show_more" data-item-type="Spell">Prepared Spells</div>
        <div class="flex-container" id="spells-section"></div>
      </div>
    </div>

    <!-- col-5 -->
    <div class="col fixed">
      <div style="height: 100%; display: flex; flex-direction: column;">
        <h3 style="flex: 0 0 2%;">Notes</h3>
        <textarea id="notes"
          style="flex: 1; border: none; box-sizing: border-box; width: 100%; resize: none;"></textarea>
      </div>
    </div>

    <!-- col-6 -->
    <div class="col flex" style="display: flex; flex-direction: column;">
      <div class="section" id="desc_name"></div>
      <div class="section" id="desc_from"></div>
      <div class="section" style="height: 250px; grid-template-columns: 250px 1fr; align-items: start;">
        <div class="section" id="desc_image" style="overflow: hidden;"></div>
        <div id="right_scroll_wrapper" style="height: 100%; overflow-y: auto; overflow-x: hidden;">
          <div class="section" id="desc_content"></div>
          <div class="section" id="desc_item" style="grid-template-columns: auto 1fr;"></div>
        </div>
      </div>
      <div class="section" id="desc_class_core" style="grid-template-columns: auto 1fr;"></div>
      <div class="section" id="desc_item_list_name" style="grid-template-columns: 1fr"></div>
      <div class="flex-container" id="desc_item_list"></div>
    </div>
  </div>
  <div id="toast"></div>
  <ul id="custom-context-menu" class="context-menu"></ul>
</body>

</html>
